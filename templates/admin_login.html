<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maestros - Gulugulu 🐧</title>
    <link rel="icon" href="/static/images/icono.png" type="image/png">
    <link href="/static/css/fonts/plus-jakarta-sans.css" rel="stylesheet" />
    <link href="/static/css/fonts/material-symbols.css" rel="stylesheet" />
    <script src="/static/js/gsap.min.js"></script>
    <style>
        /* ============ BASE ============ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --gulu: #5A9AB5;
            --gulu-dark: #2C4A58;
            --gulu-l: #E8F4FA;
            --gulu-accent: #6366f1;
            --text-main: #1A2E35;
            --card-glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fbff;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============ BACKGROUND ============ */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        .bg-webp {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-blur {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
        }

        /* ============ LOGIN CARD ============ */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-glass);
            backdrop-filter: blur(20px) saturate(160%);
            border-radius: 32px;
            padding: 40px;
            border: 2px solid #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--gulu), var(--gulu-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-header p {
            font-size: .9rem;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 700;
            margin-top: 4px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 800;
            color: var(--gulu-dark);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            height: 64px;
            background: #fff;
            border: 3px solid #0056D2;
            box-shadow: 0 4px 0 #0056D2;
            border-radius: 40px;
            padding: 0 20px 0 52px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 20px;
            color: #3B82F6;
            font-size: 24px;
        }

        .input-wrapper input:focus {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #0056D2;
            outline: none;
        }

        .login-btn {
            width: 100%;
            height: 56px;
            margin-top: 10px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            background: linear-gradient(180deg, #3B82F6 0%, #2563EB 100%);
            box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.3), inset 0 -3px 6px rgba(0, 0, 0, 0.15), 0 4px 10px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.4), inset 0 -3px 6px rgba(0, 0, 0, 0.1), 0 6px 15px rgba(37, 99, 235, 0.4);
        }

        .login-btn:active {
            transform: scale(0.96);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: .85rem;
            font-weight: 800;
            color: var(--gulu);
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--gulu-accent);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: .85rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }

        /* Gulu mascot animation space */
        .gulu-peek {
            position: absolute;
            top: -60px;
            right: 20px;
            width: 100px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>
    <div class="bg-container">
        <img src="/static/videos/fondo.webp" alt="" class="bg-webp" />
    </div>
    <div class="bg-blur"></div>

    <div class="login-card">
        <div class="gulu-peek">
            <!-- Space for any small mascot animation if needed -->
        </div>

        <div class="card-header">
            <img src="/static/images/gulu-icon.jpeg" alt="Gulu" />
            <h2>Hola, Maestro 🐧</h2>
            <p>Acceso al Panel de Control</p>
        </div>

        {% if error %}
        <div class="error-msg" style="display: block;">{{ error }}</div>
        {% endif %}

        <form action="/admin/login" method="POST" id="loginForm">
            <div class="form-group">
                <label>Nombre de Usuario</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon">person</span>
                    <input type="text" name="username" placeholder="Tu nombre..." required autofocus />
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined icon">lock</span>
                    <input type="password" name="password" placeholder="••••••••" required />
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>Entrar</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </form>

        <a href="/" class="back-link">🚀 Volver al Buscador</a>
    </div>

    <script>
        // Entrance animation
        gsap.to('.login-card', {
            opacity: 1,
            y: 0,
            duration: 0.8,
            ease: "back.out(1.2)"
        });

        // Shake on error
        const urlParams = new URLSearchParams(window.location.search);
        if ({{ 'true' if error else 'false' }}) {
            gsap.to('.login-card', {
                x: -10,
                duration: 0.1,
                repeat: 5,
                yoyo: true,
                ease: "power2.inOut",
                onComplete: () => gsap.set('.login-card', { x: 0 })
            });
        }
    </script>
</body>

</html>
